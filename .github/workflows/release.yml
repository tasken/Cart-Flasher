name: Build Cart-Flasher release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest
    env:
      BLOCKSDS: /opt/wonderful/thirdparty/blocksds/core
    name: Build with BlocksDS toolchain using official Docker image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Build app
        id: build
        # NDS_OUT is fixed so every release carries an identically-named asset,
        # keeping the /releases/latest/download/cart_flasher.nds URL permanent.
        # The version and commit shown on the boot screen are unaffected.
        run: |
          make NDS_OUT=cart_flasher.nds BANNER_VERSION=${{ github.ref_name }} CART_FLASHER_COMMIT=$(echo "${{ github.sha }}" | cut -c1-7) CART_FLASHER_VERSION=${{ github.ref_name }}
      - name: Upload cart_flasher.nds
        uses: AButler/upload-release-assets@v4.0.0
        with:
          files: cart_flasher.nds
          repo-token: ${{ secrets.GITHUB_TOKEN }}
