name: Build Cart-Flasher release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest
    env:
      BLOCKSDS: /opt/wonderful/thirdparty/blocksds/core
    name: Build with BlocksDS toolchain using official Docker image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Build app
        id: build
        run: |
          make CART_FLASHER_COMMIT=$(echo "${{ github.sha }}" | cut -c1-7) CART_FLASHER_VERSION=${{ github.ref_name }}
      - name: Upload cart_flasher.nds
        uses: AButler/upload-release-assets@v2.0
        with:
          files: cart_flasher-*.nds
          repo-token: ${{ secrets.GITHUB_TOKEN }}
