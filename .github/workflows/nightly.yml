name: Build Cart-Flasher

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: ["*"]
    paths-ignore:
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest
    env:
      BLOCKSDS: /opt/wonderful/thirdparty/blocksds/core
    name: Build with BlocksDS toolchain using official Docker image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Build app
        id: build
        env:
          # Via env:, not interpolated directly -- a crafted branch/PR name
          # must not get re-parsed as shell syntax.
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
        # NDS_OUT: cart_flasher-nightly-<commit>.nds on main, else
        # cart_flasher-<branch>-nightly-<commit>.nds. BRANCH is whitelisted to
        # [A-Za-z0-9._-] since it's later spliced unescaped into the
        # ndstool recipe's shell command via `make`.
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "$RAW_BRANCH" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')
          if [ "$BRANCH" = "main" ]; then
            NDS_NAME="cart_flasher-nightly-$SHORT_SHA.nds"
            BANNER="Nightly: $SHORT_SHA"
          else
            NDS_NAME="cart_flasher-$BRANCH-nightly-$SHORT_SHA.nds"
            BANNER="Nightly ($BRANCH): $SHORT_SHA"
          fi
          make NDS_OUT="$NDS_NAME" CART_FLASHER_COMMIT=$SHORT_SHA CART_FLASHER_VERSION=nightly BANNER_VERSION="$BANNER" CART_FLASHER_BUILD_KIND=Nightly
      - name: Publish build to GH Actions
        uses: actions/upload-artifact@v7
        with:
          # Keep the hash in the filename so downloaded nightlies identify
          # their commit.
          path: cart_flasher-*.nds
          name: cart_flasher-nightly
          if-no-files-found: error
