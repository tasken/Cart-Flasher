name: Build Cart-Flasher

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: ["*"]
    paths-ignore:
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:20230622
    name: Build with stable devkitARM using official Docker image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build app
        id: build
        run: |
          make CART_FLASHER_COMMIT=nightly
      - name: Publish build to GH Actions
        uses: actions/upload-artifact@v6
        with:
          path: cart_flasher-nightly.nds
          name: cart_flasher-nightly
